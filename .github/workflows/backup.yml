name: Daily CSV Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          check-latest: true

      - name: Install dependencies
        run: npm install @supabase/supabase-js ws

      - name: Create backup script
        run: |
          cat > backup.js << 'EOF'
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs');
          const path = require('path');

          async function backup() {
            const supabase = createClient(
              process.env.SUPABASE_URL,
              process.env.SUPABASE_SERVICE_ROLE_KEY,
              { realtime: { enabled: false } }
            );

            const backupDir = path.join(process.cwd(), 'backups');
            if (!fs.existsSync(backupDir)) fs.mkdirSync(backupDir);

            const { data: citations, error } = await supabase
              .from('citations')
              .select(`
                id,
                sr_no,
                citation,
                category_id,
                details,
                year,
                created_at,
                user_id,
                updated_at,
                categories (
                  name
                )
              `);

            if (error) throw error;

            if (!citations || citations.length === 0) {
              console.log('No citations found');
              return;
            }

            const headers = ['id', 'sr_no', 'citation', 'category_name', 'details', 'year', 'created_at', 'user_id', 'updated_at'];
            
            const rows = [
              headers.join(','),
              ...citations.map(row => {
                const categoryName = row.categories?.name || '';
                
                const values = [
                  row.id || '',
                  row.sr_no || '',
                  row.citation || '',
                  categoryName,
                  row.details || '',
                  row.year || '',
                  row.created_at || '',
                  row.user_id || '',
                  row.updated_at || ''
                ];
                
                return values.map(val => {
                  if (val === null) return '';
                  const str = String(val);
                  if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                    return '"' + str.replace(/"/g, '""') + '"';
                  }
                  return str;
                }).join(',');
              })
            ];

            const csv = rows.join('\n');
            const date = new Date().toISOString().split('T')[0];
            const filename = 'citations_backup_' + date + '.csv';
            fs.writeFileSync(path.join(backupDir, filename), csv);

            console.log('✅ Backup saved: ' + filename);
            console.log('📊 Total records: ' + citations.length);
          }

          backup().catch(err => {
            console.error('Backup failed:', err);
            process.exit(1);
          });
          EOF

      - name: Run CSV Backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node backup.js

      - name: Commit and push backup
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add backups/
          git commit -m "Automated backup $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
