name: Monthly Logs (Citations + System Logs)

on:
  schedule:
    - cron: '0 2 1 * *'      # 1st of every month at 2 AM UTC
  workflow_dispatch:

jobs:
  export-logs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install @supabase/supabase-js

      - name: Generate citations CSV and system logs CSV
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);

          const fmt = d => d ? new Date(d).toISOString().slice(0,19).replace('T',' ') : '';
          const escape = v => v == null ? '' : String(v).includes(',') ? `"${String(v).replace(/"/g,'""')}"` : String(v);

          async function main() {
            // ----- 1. Citations CSV (with deleted flag) -----
            const { data: citations } = await supabase.from('citations').select('*').order('created_at');
            const { data: users } = await supabase.from('users').select('id,name,email');
            const { data: cats } = await supabase.from('categories').select('id,name');
            const userMap = Object.fromEntries((users||[]).map(u=>[u.id, u.name||u.email||'Unknown']));
            const catMap = Object.fromEntries((cats||[]).map(c=>[c.id, c.name]));
            let sr=1;
            const citationRows = (citations||[]).map(c => {
              // Fix line breaks: replace newlines with space in details field
              let detailsText = c.details || '';
              detailsText = detailsText.replace(/\n/g, ' ').replace(/\r/g, ' ');
              return {
                sr_no: sr++,
                citation: c.citation||'',
                category_name: catMap[c.category_id]||c.category_id||'',
                details: detailsText,
                year: c.year||'',
                user_name: userMap[c.user_id]||'Unknown',
                created_at: fmt(c.created_at),
                updated_at: fmt(c.updated_at),
                deleted: c.deleted_at ? 'deleted' : ''
              };
            });
            if (citationRows.length) {
              const headers = ['sr_no','citation','category_name','details','year','user_name','created_at','updated_at','deleted'];
              const csv = [headers.join(','), ...citationRows.map(r=>headers.map(h=>escape(r[h])).join(','))].join('\n');
              const now = new Date();
              const file = `monthly-logs/citations_${now.getFullYear()}_${String(now.getMonth()+1).padStart(2,'0')}.csv`;
              fs.mkdirSync('monthly-logs', {recursive:true});
              fs.writeFileSync(file, csv);
              console.log(`Citations CSV: ${citationRows.length} rows`);
            }

            // ----- 2. System logs CSV (exclude citation actions, rename details to log_details) -----
            const { data: logs } = await supabase
              .from('system_logs')
              .select('*, users(name)')
              .not('action','in','(citation_created,citation_updated,citation_deleted)')
              .order('created_at',{ascending:false});
            if (logs && logs.length) {
              const sysRows = logs.map(l => ({
                timestamp: fmt(l.created_at),
                action: l.action,
                user_name: l.users?.name || l.user_id || 'system',
                log_details: typeof l.details === 'object' ? JSON.stringify(l.details) : (l.details||''),
                ip: l.ip_address||''
              }));
              const headers = ['timestamp','action','user_name','log_details','ip'];
              const csv = [headers.join(','), ...sysRows.map(r=>headers.map(h=>escape(r[h])).join(','))].join('\n');
              const now = new Date();
              const file = `monthly-logs/system_${now.getFullYear()}_${String(now.getMonth()+1).padStart(2,'0')}.csv`;
              fs.writeFileSync(file, csv);
              console.log(`System logs CSV: ${sysRows.length} rows`);
            }
          }
          main().catch(e=>{console.error(e); process.exit(1);});
          EOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add monthly-logs/
          git commit -m "Monthly logs $(date +'%Y-%m-%d')" || echo "No changes"
          git push

      - name: Keep only last 3 months logs
        run: |
          cd monthly-logs
          ls -1 citations_*.csv 2>/dev/null | sort -r | tail -n +4 | xargs -r rm -f
          ls -1 system_*.csv 2>/dev/null | sort -r | tail -n +4 | xargs -r rm -f
          cd ..
          git add monthly-logs/
          git commit -m "Cleanup old logs (keep last 3)" || echo "No changes"
          git push
